name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allows manual trigger from the GitHub Actions UI

env:
  REGION: asia-southeast1                          # Change if you prefer a different region
  SERVICE: weather-backend                         # Cloud Run service name
  REGISTRY: asia-southeast1-docker.pkg.dev         # Artifact Registry host for this region
  REPOSITORY: weather-app                          # Artifact Registry repository name

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for google-github-actions/auth

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ─────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── 4. Authorise Docker to push to Artifact Registry ────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 5. Build & push image ────────────────────────────────────────────
      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/backend"

          docker build \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            ./backend

          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      # ── 6. Deploy to Cloud Run ───────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }}"

          gcloud run deploy ${{ env.SERVICE }} \
            --image "${IMAGE}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }},MONGODB_URL=${{ secrets.MONGODB_URL }},MONGODB_DB=${{ secrets.MONGODB_DB }}" \
            --project ${{ secrets.GCP_PROJECT_ID }}

      # ── 7. Print the live service URL ────────────────────────────────────
      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)"
